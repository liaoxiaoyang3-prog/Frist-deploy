<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - EMBU Portal</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #1e4e8c;
            --bg-gradient-start: #f8fafc;
            --bg-gradient-end: #e2e8f0;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --error-bg: #fef2f2;
            --error-text: #b91c1c;
            --error-border: #fee2e2;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .otp-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
            width: 100%;
            max-width: 410px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.7);
            text-align: center;
        }
        .title { color: var(--text-main); margin-bottom: 8px; font-size: 1.5rem; font-weight: 700; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; line-height: 1.4; }
        .error-banner {
            background-color: var(--error-bg);
            color: var(--error-text);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--error-border);
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            text-align: center;
            letter-spacing: 0.5em;
            font-size: 1.5rem;
            font-weight: bold;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #f8fafc;
            margin-bottom: 20px;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(43, 108, 176, 0.12);
        }
        .submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .submit-btn:hover { background-color: var(--primary-hover); }
    </style>
</head>
<body>

    <div class="otp-card">
        <h2 class="title">Verify Your Email</h2>
        <p class="subtitle">We sent a 6-digit security code to <br><strong>{{ email }}</strong></p>

        {% if error %}
            <div class="error-banner">⚠️ {{ error }}</div>
        {% endif %}

        <form action="{{ url_for('auth.verify_otp') }}" method="POST">
            <input type="text" name="otp" class="form-input" placeholder="000000" maxlength="6" required autocomplete="off">
            <button type="submit" class="submit-btn">Verify & Register Account</button>
        </form>
    </div>

</body>
</html>
