<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMBU Portal — Command Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ─── Reset & Core ────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold:        #d4af37;
            --gold-light:  #f4d03f;
            --gold-muted:  #c5a02e;
            --pearl:       #ffffff;
            --charcoal:    #111111;
            --transition:  cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
        }

        /* ─── Sophisticated Background Animation ───────────────────── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #fff;
            overflow: hidden;
        }

        /* Morphing Liquid Gradients */
        .liquid-layer {
            position: absolute;
            width: 150vmax;
            height: 150vmax;
            top: -25vmax;
            left: -25vmax;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 1) 0%, transparent 60%),
                radial-gradient(circle at 10% 80%, rgba(180, 150, 50, 0.08) 0%, transparent 30%);
            filter: blur(60px);
            animation: morphLiquid 25s ease-in-out infinite alternate;
        }

        @keyframes morphLiquid {
            0%   { transform: translate(0, 0) rotate(0deg) scale(1); }
            33%  { transform: translate(5%, -5%) rotate(5deg) scale(1.1); }
            66%  { transform: translate(-2%, 8%) rotate(-3deg) scale(0.95); }
            100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        }

        /* Floating Silk Ribbons (Animated SVG) */
        .silk-ribbon {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.4;
            pointer-events: none;
        }

        /* Drifting Golden Dust Particles */
        .dust-container {
            position: absolute;
            inset: 0;
            perspective: 1000px;
        }

        .particle {
            position: absolute;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            filter: blur(1px);
            animation: drift var(--dur) linear infinite;
        }

        @keyframes drift {
            0%   { transform: translate(var(--sx), var(--sy)) translateZ(0); opacity: 0; }
            20%  { opacity: 0.6; }
            80%  { opacity: 0.6; }
            100% { transform: translate(var(--ex), var(--ey)) translateZ(200px); opacity: 0; }
        }

        /* ─── Main Layout ───────────────────────────────────────────── */
        .page-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 24px;
        }

        /* ─── The Pearl Card ────────────────────────────────────────── */
        .login-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(50px) saturate(180%);
            -webkit-backdrop-filter: blur(50px) saturate(180%);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 64px 56px 52px;
            box-shadow: 
                0 40px 100px rgba(0,0,0,0.06),
                0 0 0 1px rgba(212, 175, 55, 0.15),
                inset 0 0 20px rgba(255,255,255,0.5);
            
            opacity: 0;
            transform: scale(0.98) translateY(20px);
            animation: cardReveal 1.2s var(--transition) forwards;
        }

        @keyframes cardReveal {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ─── Brand Identity ────────────────────────────────────────── */
        .brand-section {
            text-align: center;
            margin-bottom: 52px;
        }

        .brand-logo-container {
            margin-bottom: 28px;
            position: relative;
            display: inline-block;
        }

        .brand-logo-ring {
            position: absolute;
            inset: -12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 50%;
            animation: ringRotate 15s linear infinite;
        }

        @keyframes ringRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .brand-logo {
            width: 80px; height: 80px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            position: relative;
            z-index: 2;
        }

        .brand-logo svg { width: 36px; height: 36px; }

        .brand-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 300;
            color: var(--charcoal);
            letter-spacing: -0.01em;
            line-height: 1;
            margin-bottom: 8px;
        }

        .brand-title span { font-weight: 600; font-style: italic; color: var(--gold-muted); }

        .brand-subtitle {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #999;
            font-weight: 500;
        }

        /* ─── Form Styling ──────────────────────────────────────────── */
        .form-group {
            margin-bottom: 32px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #bbb;
            margin-bottom: 12px;
            margin-left: 4px;
            transition: color 0.4s ease;
        }

        .input-wrapper {
            position: relative;
            border-bottom: 1.5px solid #eee;
            transition: border-color 0.4s ease;
        }

        .form-input {
            width: 100%;
            padding: 12px 4px;
            background: transparent;
            border: none;
            font-size: 1rem;
            color: var(--charcoal);
            font-family: 'Inter', sans-serif;
            transition: all 0.4s ease;
        }

        .form-input::placeholder { color: #ccc; font-weight: 300; }
        .form-input:focus { outline: none; }

        /* Focus Underline Animation */
        .input-focus-line {
            position: absolute;
            bottom: -1.5px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--gold);
            transition: width 0.6s var(--transition);
        }

        .form-input:focus + .input-focus-line { width: 100%; }
        .form-group:focus-within .form-label { color: var(--gold); }

        /* ─── Submit Button ──────────────────────────────────────────── */
        .btn-container {
            margin-top: 16px;
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background: var(--charcoal);
            border: none;
            border-radius: 100px;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.5s var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            letter-spacing: 0.25em;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: translateX(-100%);
            transition: transform 0.8s ease;
        }

        .submit-btn:hover::before { transform: translateX(100%); }

        /* ─── Footer Links ───────────────────────────────────────────── */
        .form-footer {
            text-align: center;
            margin-top: 48px;
        }

        .forgot-link {
            font-size: 0.8rem;
            color: #aaa;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .forgot-link:hover { color: var(--gold); }

        .signup-wrap {
            margin-top: 24px;
            font-size: 0.85rem;
            color: #999;
        }

        .signup-link {
            color: var(--charcoal);
            text-decoration: none;
            font-weight: 600;
            margin-left: 8px;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }
        .signup-link:hover { border-bottom-color: var(--gold); color: var(--gold-muted); }

        /* ─── Error Banner ──────────────────────────────────────────── */
        .error-banner {
            background: rgba(255, 100, 100, 0.05);
            border-left: 3px solid #ff6464;
            color: #d63031;
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 32px;
            animation: slideIn 0.5s var(--transition);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>

<body>

    <!-- Background Canvas -->
    <div class="bg-canvas">
        <div class="liquid-layer"></div>
        
        <!-- Animated Silk Ribbons (SVG) -->
        <svg class="silk-ribbon" viewBox="0 0 1000 1000" preserveAspectRatio="none">
            <path d="M-100,500 Q250,300 500,500 T1100,500" fill="none" stroke="rgba(212,175,55,0.05)" stroke-width="2">
                <animate attributeName="d" dur="10s" repeatCount="indefinite"
                    values="M-100,500 Q250,300 500,500 T1100,500;
                            M-100,500 Q250,700 500,500 T1100,500;
                            M-100,500 Q250,300 500,500 T1100,500" />
            </path>
            <path d="M-100,600 Q250,400 500,600 T1100,600" fill="none" stroke="rgba(212,175,55,0.03)" stroke-width="1">
                <animate attributeName="d" dur="15s" repeatCount="indefinite"
                    values="M-100,600 Q250,400 500,600 T1100,600;
                            M-100,600 Q250,800 500,600 T1100,600;
                            M-100,600 Q250,400 500,600 T1100,600" />
            </path>
        </svg>

        <div class="dust-container" id="dustContainer"></div>
    </div>

    <div class="page-wrapper">
        <div class="login-card">
            
            <div class="brand-section">
                <div class="brand-logo-container">
                    <div class="brand-logo-ring"></div>
                    <div class="brand-logo">
                        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M16 4L19.5 11.5H27L21 16.5L23.5 24L16 19.5L8.5 24L11 16.5L5 11.5H12.5L16 4Z" fill="var(--gold)"/>
                        </svg>
                    </div>
                </div>
                <h1 class="brand-title">EMBU <span>Hotel</span></h1>
                <p class="brand-subtitle">Command Portal Access</p>
            </div>

            {% if error %}
            <div class="error-banner">
                {{ error }}
            </div>
            {% endif %}

            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" name="email" class="form-input" placeholder="name@embu.com" required>
                        <div class="input-focus-line"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                        <div class="input-focus-line"></div>
                    </div>
                </div>

                <div class="btn-container">
                    <button type="submit" class="submit-btn">
                        Enter Portal
                    </button>
                </div>
            </form>

            <div class="form-footer">
                <a href="{{ url_for('auth.reset_request') }}" class="forgot-link">Request password reset</a>
                <div class="signup-wrap">
                    Need an account? <a href="{{ url_for('auth.signup') }}" class="signup-link">Apply for Access</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Generate drifting dust particles
        const container = document.getElementById('dustContainer');
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            
            const size = Math.random() * 3 + 1;
            const sx = Math.random() * 100 + 'vw';
            const sy = Math.random() * 100 + 'vh';
            const ex = (Math.random() * 100 - 50) + 'px';
            const ey = (Math.random() * 100 - 50) + 'px';
            const dur = Math.random() * 10 + 10 + 's';
            const delay = Math.random() * -20 + 's';

            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.setProperty('--sx', sx);
            p.style.setProperty('--sy', sy);
            p.style.setProperty('--ex', ex);
            p.style.setProperty('--ey', ey);
            p.style.setProperty('--dur', dur);
            p.style.animationDelay = delay;

            container.appendChild(p);
        }
    </script>
</body>
</html>
